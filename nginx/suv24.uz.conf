# /etc/nginx/sites-available/suv24.uz.conf
# Symlink to sites-enabled. Run `certbot --nginx` afterwards; it adds SSL
# directives, HTTPS redirect, and reloads nginx automatically.
#
# All routing (static SPA, /api/, /media/) is handled by the admin container's
# internal nginx on 127.0.0.1:8020. Host nginx only terminates SSL and forwards.

server {
    listen 80;
    listen [::]:80;
    server_name suv24.uz www.suv24.uz;

    client_max_body_size 8m;

    # Canonicalize www → apex
    if ($host = www.suv24.uz) {
        return 301 $scheme://suv24.uz$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
