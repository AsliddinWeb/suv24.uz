# /etc/nginx/sites-available/suv24.uz.conf
# Symlink from sites-enabled. Certbot adds SSL config automatically.
#
# Replace /srv/suv24 with the actual deploy path and 8017 with BACKEND_HOST_PORT.

# Redirect www → apex (after certbot adds SSL you'll have two server blocks on 443 too)
server {
    listen 80;
    listen [::]:80;
    server_name suv24.uz www.suv24.uz;

    # Let certbot answer HTTP-01 challenges here before it installs SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS (certbot will install this redirect)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.suv24.uz;

    # SSL certs managed by certbot — see deploy.md step 6
    ssl_certificate     /etc/letsencrypt/live/suv24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suv24.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Canonicalize to apex
    return 301 https://suv24.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name suv24.uz;

    ssl_certificate     /etc/letsencrypt/live/suv24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suv24.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Driver app uploads a logo up to 2MB; leave some room for future uploads
    client_max_body_size 8m;

    # Vue SPA static build. Built on server with: cd admin && npm ci && npm run build
    root /srv/suv24/admin/dist;
    index index.html;

    # Vite produces hashed filenames in /assets — cache aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon/static root files
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /favicon.svg { access_log off; log_not_found off; }
    location = /apple-touch-icon.png { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; allow all; }

    # API → FastAPI container
    location /api/ {
        proxy_pass http://127.0.0.1:8017;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Uploaded media (company logos, etc.) served by backend's StaticFiles mount
    location /media/ {
        proxy_pass http://127.0.0.1:8017;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Swagger/OpenAPI (optional — lock down or remove in production)
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:8017;
        proxy_set_header Host $host;
        # Uncomment to restrict to office IP only:
        # allow 203.0.113.0/24;
        # deny all;
    }

    # Health check (optional)
    location = /health {
        proxy_pass http://127.0.0.1:8017;
        access_log off;
    }

    # SPA fallback — Vue Router handles all paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip the text stuff
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;
}
