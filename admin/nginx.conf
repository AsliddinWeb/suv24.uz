# Container-internal nginx. Serves Vue SPA static build and reverse-proxies
# /api/ and /media/ to the backend container over the docker network.
# Host-level nginx only needs to forward one port to this container.

server {
    listen 80;
    server_name _;

    client_max_body_size 8m;

    root /usr/share/nginx/html;
    index index.html;

    # API → FastAPI backend over docker network
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Uploaded media (logos etc.)
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health/docs passthrough
    location = /health {
        proxy_pass http://backend:8000;
        access_log off;
    }
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Vite hashed assets — cache aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /favicon.svg { access_log off; log_not_found off; }
    location = /apple-touch-icon.png { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; allow all; }

    # Vue Router SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;
}
